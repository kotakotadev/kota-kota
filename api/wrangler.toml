name = "kotakotadev-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "kotakotadev-db"
database_id = "c6cd0337-cdbe-4fe9-80a6-d1b2c16bd463"

[[r2_buckets]]
binding = "R2"
bucket_name = "kotakotadev-uploads"

[vars]
ENVIRONMENT = "production"
APP_URL = "https://kotakota.base.my.id"
APP_NAME = "kotakota"
API_URL = "https://kotakotadev-api.kotakota-developer.workers.dev"
UPLOADS_URL = "https://kotakotadev-uploads.r2.dev"
GITHUB_ORG = "kotakotadev"
GITHUB_TEMPLATE_REPO = "city-template"

# Secrets — set via: wrangler secret put SECRET_NAME
# GITHUB_BOT_TOKEN
# GITHUB_WEBHOOK_SECRET
# JWT_SECRET
# EMAIL_WORKER_URL
# EMAIL_WORKER_SECRET
# RESEND_API_KEY

# ─── Dev environment overrides ───────────────────────────────────────────────
# Used when running: wrangler dev
# Secrets for dev go in .dev.vars (gitignored) — see .dev.vars.example
[env.dev.vars]
ENVIRONMENT = "development"
APP_URL = "http://localhost:5173"
API_URL = "http://localhost:8787"
UPLOADS_URL = "http://localhost:8787/uploads-preview"
